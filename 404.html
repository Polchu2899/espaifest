  'equipamientos': '#business',

  'tarjeta_fidelizacion': '#fidelizacion',

  'politica-de-cookies': 'cookies.html',
};

(function(){
  // Obtener el path actual sin la barra inicial
  var path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  var target = REDIRECTS[path];
  if(target){
    if(target.startsWith('#')){
      window.location.replace('/' + target);
    } else {
      window.location.replace('/' + target);
    }
  } else {
    // URL no mapeada → home
    window.location.replace('/');
  }
})();
</script>
